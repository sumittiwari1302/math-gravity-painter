kind = "mobile"
previewPath = "/"
title = "Math Gravity Painter"
version = "1.0.0"
id = "artifacts/math-gravity-painter"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 26019

[services.development]
run = "pnpm --filter @workspace/math-gravity-painter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/math-gravity-painter", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/math-gravity-painter", "run", "serve" ]

[services.env]
PORT = "26019"
BASE_PATH = "/"
